<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت قطب‌نما</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        :root { --pink: #d97b7b; --green: #7ca881; --blue: #4ea8de; --bg: #f4f0ec; --text-dark: #2c3e50; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-dark); padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--white); padding: 15px 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 20px; color: var(--pink); font-weight: 900; }
        .layout { display: flex; gap: 20px; height: calc(100vh - 100px); }
        .sidebar { width: 300px; background: var(--white); border-radius: 16px; padding: 20px; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .student-card { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .student-card:hover { border-color: var(--blue); background: #e3f2fd; }
        .student-card.active { border-color: var(--blue); background: var(--blue); color: var(--white); }
        .board { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .request-box { background: #fffdf5; border: 2px dashed #fca311; padding: 15px; border-radius: 12px; font-weight: bold; }
        .kanban-cols { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; flex: 1; }
        .day-column { min-width: 280px; background: #eef2f5; border: 2px solid #ddd; border-radius: 16px; display: flex; flex-direction: column; }
        .day-header { padding: 15px; background: var(--white); border-radius: 14px 14px 0 0; font-weight: 900; display: flex; justify-content: space-between; border-bottom: 2px solid #ddd;}
        .block-list { padding: 10px; flex: 1; overflow-y: auto; min-height: 200px; }
        .task-card { background: var(--white); padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: grab; border-right: 5px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .task-card:active { cursor: grabbing; transform: scale(0.98); }
        .task-card.general { border-color: #fca311; }
        .task-card.fixed { border-color: #6c757d; background: #f8f9fa; }
        .task-card.break { border-color: var(--pink); background: #fdfdfd; }
        .task-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .task-time { font-size: 11px; color: #666; background: #eee; padding: 3px 8px; border-radius: 6px; display: inline-block; }
        .task-actions { position: absolute; left: 10px; top: 10px; display: flex; gap: 5px; }
        .btn-icon { background: #eee; border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-icon:hover { background: #ddd; }
        .btn-delete { color: #d9534f; background: #ffeded; }
        .btn-primary { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-add { width: 100%; padding: 10px; background: transparent; border: 2px dashed #ccc; color: #777; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 5px;}
        /* پاپ‌آپ */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 25px; border-radius: 16px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal input, .modal select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; }
        .modal-buttons { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚙️ اتاق فرمان قطب‌نما (پنل ادمین)</h1>
        <div>
            <span id="saveStatus" style="color:var(--green); font-weight:bold; margin-left: 15px; display:none;">✅ ذخیره شد</span>
            <button class="btn-primary" onclick="publishSchedule()" id="btnPublish" disabled>🚀 تایید نهایی و ارسال به اپلیکیشن دانش‌آموز</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <h3 style="margin-bottom: 15px; font-size: 15px;">📥 برنامه‌های در انتظار تایید</h3>
            <div id="pendingList">در حال دریافت اطلاعات...</div>
        </div>

        <div class="board" id="calendarBoard" style="display: none;">
            <div class="request-box">
                <span style="color: #b5740a;">💬 پیام و درخواست دانش‌آموز در این هفته: </span>
                <span id="studentRequestText" style="color: #444;"></span>
            </div>
            <div class="kanban-cols" id="kanbanCols"></div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3 style="margin-bottom: 15px;" id="modalTitle">ویرایش پارت</h3>
            <label>عنوان:</label><input type="text" id="m_title">
            <label>نوع بلوک:</label>
            <select id="m_type">
                <option value="study">درس</option><option value="break">استراحت/خواب</option><option value="fixed">کلاس/ثابت</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;"><label>دقیقه شروع (بامداد):</label><input type="number" id="m_start"></div>
                <div style="flex: 1;"><label>دقیقه پایان:</label><input type="number" id="m_end"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn-primary" style="flex: 1;" onclick="saveBlockDetails()">ذخیره</button>
                <button class="btn-primary" style="flex: 1; background: #ccc; color: #333;" onclick="closeModal()">انصراف</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co'; // 👈 لینک سوپابیس
        const SUPABASE_KEY = 'YOUR_ANON_KEY'; // 👈 کلید سوپابیس

        let pendingSchedules = []; let currentEditingSchedule = null; let editingDayIndex = null; let editingBlockIndex = null;
        const daysOfWeek = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];

        async function dbRequest(endpoint, method = 'GET', body = null) {
            const options = { method: method, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }};
            if(body) options.body = JSON.stringify(body);
            try { const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, options); if(!res.ok) throw new Error("DB Error"); return method === 'GET' || method === 'PATCH' ? await res.json() : true; } catch(e){ return []; }
        }

        function minsToTime(m) { return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; }

        async function loadPending() {
            try {
                // مشکل در اینجا بود که برطرف شد (انکود کردن کلمه فارسی در URL)
                let statusStr = encodeURIComponent('در انتظار');
                let schedules = await dbRequest(`weekly_schedules?status=eq.${statusStr}&select=*,students(full_name)`);
                pendingSchedules = schedules || [];
                
                let listHTML = '';
                if(pendingSchedules.length === 0) listHTML = '<p style="color:#777; font-size:13px;">هیچ برنامه‌ای در انتظار تایید نیست.</p>';
                
                pendingSchedules.forEach((sch, i) => {
                    listHTML += `<div class="student-card" id="card_${sch.id}" onclick="openSchedule(${i}, '${sch.id}')">
                        <strong>${sch.students.full_name}</strong><br><span style="font-size: 12px; color: #666;">${sch.week_name}</span>
                    </div>`;
                });
                document.getElementById('pendingList').innerHTML = listHTML;
            } catch(e) { console.error(e); }
        }

        function openSchedule(index, id) {
            document.querySelectorAll('.student-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card_${id}`).classList.add('active');
            currentEditingSchedule = pendingSchedules[index];
            document.getElementById('btnPublish').disabled = false;
            document.getElementById('studentRequestText').innerText = currentEditingSchedule.student_reflection || "بدون درخواست خاص";
            renderBoard();
        }

        function renderBoard() {
            document.getElementById('calendarBoard').style.display = 'flex';
            let board = document.getElementById('kanbanCols'); board.innerHTML = '';
            let scheduleArray = currentEditingSchedule.schedule_json;

            scheduleArray.forEach((dayBlocks, dayIndex) => {
                dayBlocks.sort((a,b) => a.start - b.start);
                let col = document.createElement('div'); col.className = 'day-column';
                let html = `<div class="day-header"><span>📅 ${daysOfWeek[dayIndex]}</span></div>`;
                html += `<div class="block-list" data-day="${dayIndex}" ondragover="allowDrop(event)" ondrop="drop(event)">`;
                
                dayBlocks.forEach((block, blockIndex) => {
                    let cssClass = block.type === 'study' ? (block.isGen ? 'general' : '') : block.type;
                    html += `<div class="task-card ${cssClass}" draggable="true" ondragstart="drag(event, ${dayIndex}, ${blockIndex})">
                        <div class="task-actions"><button class="btn-icon" onclick="openModal(${dayIndex}, ${blockIndex})">✏️</button><button class="btn-icon btn-delete" onclick="deleteBlock(${dayIndex}, ${blockIndex})">🗑️</button></div>
                        <div style="margin-right: 45px;"><div class="task-title">${block.title}</div><div class="task-time">${minsToTime(block.start)} تا ${minsToTime(block.end)}</div></div>
                    </div>`;
                });
                
                html += `</div><div style="padding:10px;"><button class="btn-add" onclick="openModal(${dayIndex}, null)">➕ پارت جدید</button></div>`;
                col.innerHTML = html; board.appendChild(col);
            });
        }

        let dragDay = null; let dragIdx = null;
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev, d, i) { dragDay = d; dragIdx = i; }
        function drop(ev) {
            ev.preventDefault(); let target = ev.target.closest('.block-list'); if(!target) return;
            let toDay = parseInt(target.getAttribute('data-day'));
            let sch = currentEditingSchedule.schedule_json;
            let moved = sch[dragDay].splice(dragIdx, 1)[0];
            sch[toDay].push(moved);
            renderBoard(); showSaveStatus();
        }

        function deleteBlock(d, i) { if(confirm("حذف شود؟")) { currentEditingSchedule.schedule_json[d].splice(i, 1); renderBoard(); showSaveStatus(); } }

        function openModal(d, i) {
            editingDayIndex = d; editingBlockIndex = i;
            let block = i !== null ? currentEditingSchedule.schedule_json[d][i] : {title:'', type:'study', start:'', end:''};
            document.getElementById('modalTitle').innerText = i !== null ? "ویرایش" : "پارت جدید";
            document.getElementById('m_title').value = block.title; document.getElementById('m_type').value = block.type;
            document.getElementById('m_start').value = block.start; document.getElementById('m_end').value = block.end;
            document.getElementById('editModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        
        function saveBlockDetails() {
            let n = { title: document.getElementById('m_title').value, type: document.getElementById('m_type').value, start: parseInt(document.getElementById('m_start').value), end: parseInt(document.getElementById('m_end').value), isGen: false };
            if(editingBlockIndex !== null) currentEditingSchedule.schedule_json[editingDayIndex][editingBlockIndex] = n;
            else currentEditingSchedule.schedule_json[editingDayIndex].push(n);
            closeModal(); renderBoard(); showSaveStatus();
        }

        function showSaveStatus() { let el = document.getElementById('saveStatus'); el.style.display = 'inline'; setTimeout(() => el.style.display = 'none', 2000); }

        async function publishSchedule() {
            if(!confirm("تایید نهایی؟ برنامه بلافاصله برای دانش‌آموز نمایش داده می‌شود.")) return;
            document.getElementById('btnPublish').disabled = true; document.getElementById('btnPublish').innerText = "در حال ارسال...";
            await dbRequest(`weekly_schedules?id=eq.${currentEditingSchedule.id}`, 'PATCH', { schedule_json: currentEditingSchedule.schedule_json, status: 'تایید شده' });
            alert("✅ برنامه منتشر شد!");
            document.getElementById('calendarBoard').style.display = 'none'; document.getElementById('btnPublish').innerText = "🚀 ارسال"; loadPending();
        }

        loadPending();
    </script>
</body>
</html>
