<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتاق فرمان قطب‌نما (پنل مشاور ادمین)</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        :root { --pink: #d97b7b; --green: #7ca881; --blue: #4ea8de; --bg: #f4f0ec; --text-dark: #2c3e50; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-dark); padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--white); padding: 15px 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 20px; color: var(--pink); font-weight: 900; }
        .layout { display: flex; gap: 20px; height: calc(100vh - 120px); }
        .sidebar { width: 300px; background: var(--white); border-radius: 16px; padding: 20px; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .student-card { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .student-card:hover { border-color: var(--blue); background: #e3f2fd; }
        .student-card.active { border-color: var(--blue); background: var(--blue); color: var(--white); }
        .board { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .request-box { background: #fffdf5; border: 2px dashed #fca311; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 14px;}
        .kanban-cols { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; flex: 1; }
        .day-column { min-width: 280px; background: #eef2f5; border: 2px solid #ddd; border-radius: 16px; display: flex; flex-direction: column; }
        .day-header { padding: 15px; background: var(--white); border-radius: 14px 14px 0 0; font-weight: 900; display: flex; justify-content: space-between; border-bottom: 2px solid #ddd;}
        .block-list { padding: 10px; flex: 1; overflow-y: auto; min-height: 200px; }
        .task-card { background: var(--white); padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: grab; border-right: 5px solid var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .task-card:active { cursor: grabbing; transform: scale(0.98); }
        .task-card.general { border-color: #fca311; }
        .task-card.fixed { border-color: #6c757d; background: #f8f9fa; }
        .task-card.break { border-color: var(--pink); background: #fdfdfd; }
        .task-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .task-time { font-size: 11px; color: #666; background: #eee; padding: 3px 8px; border-radius: 6px; display: inline-block; }
        .task-actions { position: absolute; left: 10px; top: 10px; display: flex; gap: 5px; }
        .btn-icon { background: #eee; border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-delete { color: #d9534f; background: #ffeded; }
        .btn-primary { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-add { width: 100%; padding: 10px; background: transparent; border: 2px dashed #ccc; color: #777; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 5px;}
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 25px; border-radius: 16px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal input, .modal select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; }
        .modal-buttons { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚙️ اتاق فرمان قطب‌نما (پنل ادمین)</h1>
        <div>
            <span id="saveStatus" style="color:var(--green); font-weight:bold; margin-left:15px; display:none;">✅ اعمال شد</span>
            <button class="btn-primary" onclick="publishSchedule()" id="btnPublish" disabled>🚀 تایید نهایی و انتشار برنامه برای دانش‌آموز</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <h3 style="margin-bottom: 15px; font-size: 15px;">📥 برنامه‌های در انتظار تایید مشاور</h3>
            <div id="pendingList">در حال بارگذاری لیست... ⏳</div>
        </div>
        <div class="board" id="calendarBoard" style="display: none;">
            <div class="request-box">💬 درخواست دانش‌آموز: <span id="studentRequestText" style="color:#222;"></span></div>
            <div class="kanban-cols" id="kanbanCols"></div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3 style="margin-bottom:15px;" id="modalTitle">ویرایش پارت</h3>
            <label>عنوان:</label><input type="text" id="m_title">
            <label>نوع بلوک:</label><select id="m_type"><option value="study">درس</option><option value="break">استراحت/خواب</option><option value="fixed">ثابت/کلاس/غذا</option></select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>شروع (دقیقه از بامداد):</label><input type="number" id="m_start"></div>
                <div style="flex:1;"><label>پایان (دقیقه از بامداد):</label><input type="number" id="m_end"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn-primary" style="flex:1;" onclick="saveBlockDetails()">ذخیره</button>
                <button class="btn-primary" style="flex:1; background:#ccc; color:#333;" onclick="closeModal()">انصراف</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات مرکزی (کلیدها را اینجا قرار بده)
        // ==========================================
        const SUPABASE_URL = 'https://lajkvzlbvidiradmyowc.supabase.co'; // 👈 لینک سوپابیس شما
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxhamt2emxidmlkaXJhZG15b3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjcyNDksImV4cCI6MjA5NzAwMzI0OX0.IB_fVUyK4kejuy88p_R7zn8xdCst9OVRqWBMoo_bNKY'; // 👈 کلید سوپابیس شما 

        let pendingSchedules = []; 
        let currentEditingSchedule = null; 
        let editingDayIndex = null; 
        let editingBlockIndex = null;
        
        const daysOfWeek = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];

        async function dbRequest(endpoint, method = 'GET', body = null) {
            let cleanUrl = SUPABASE_URL.endsWith('/') ? SUPABASE_URL.slice(0, -1) : SUPABASE_URL;
            const options = { 
                method: method, 
                headers: { 
                    'apikey': SUPABASE_KEY, 
                    'Authorization': `Bearer ${SUPABASE_KEY}`, 
                    'Content-Type': 'application/json', 
                    'Prefer': 'return=representation' 
                }
            };
            if(body) options.body = JSON.stringify(body);
            try { 
                const res = await fetch(`${cleanUrl}/rest/v1/${endpoint}`, options); 
                if(!res.ok) {
                    console.error("ارور از سوپابیس:", await res.text());
                    return null;
                }
                return method === 'GET' || method === 'PATCH' ? await res.json() : true; 
            } catch(e) { 
                console.error("ارور شبکه:", e);
                return null; 
            }
        }

        function minsToTime(m) { 
            return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; 
        }

        // ==========================================
        // 📥 بارگذاری لیست دانش‌آموزان در انتظار (بدون ارور JOIN)
        // ==========================================
        async function loadPending() {
            try {
                let statusStr = encodeURIComponent('در انتظار');
                
                // ۱. فقط برنامه‌های در انتظار را می‌گیریم
                let schedules = await dbRequest(`weekly_schedules?status=eq.${statusStr}&select=*`);
                
                if (!schedules || schedules.length === 0) {
                    document.getElementById('pendingList').innerHTML = '<p style="color:#777; font-size:13px; text-align:center;">🎉 هیچ برنامه‌ای در صف بررسی نیست.</p>';
                    return;
                }

                // ۲. اسم همه دانش‌آموزها را جداگانه می‌گیریم تا خطای ارتباطی پیش نیاید
                let students = await dbRequest(`students?select=id,full_name`);
                let studentMap = {};
                if (students) {
                    students.forEach(s => studentMap[s.id] = s.full_name);
                }

                pendingSchedules = schedules;
                let html = '';
                
                pendingSchedules.forEach((sch, i) => { 
                    // تطبیق دستی نام با آیدی
                    let sName = studentMap[sch.student_id] || "دانش‌آموز ناشناس";
                    html += `<div class="student-card" id="card_${sch.id}" onclick="openSchedule(${i}, '${sch.id}')">
                        <strong>${sName}</strong><br>
                        <span style="font-size:12px; color:#666;">${sch.week_name}</span>
                    </div>`; 
                });
                document.getElementById('pendingList').innerHTML = html;

            } catch(e) { 
                console.error(e); 
                document.getElementById('pendingList').innerHTML = '<p style="color:red; font-size:13px;">خطا در دریافت لیست. کنسول مرورگر را چک کنید.</p>';
            }
        }

        function openSchedule(index, id) {
            document.querySelectorAll('.student-card').forEach(c => c.classList.remove('active')); 
            document.getElementById(`card_${id}`).classList.add('active');
            
            currentEditingSchedule = pendingSchedules[index]; 
            document.getElementById('btnPublish').disabled = false;
            
            let reqText = currentEditingSchedule.student_reflection;
            document.getElementById('studentRequestText').innerText = (reqText && reqText.length > 2) ? reqText : "دانش‌آموز هیچ درخواست خاصی برای این هفته ننوشته است."; 
            
            renderBoard();
        }

        function renderBoard() {
            document.getElementById('calendarBoard').style.display = 'flex';
            let board = document.getElementById('kanbanCols'); 
            board.innerHTML = '';
            
            currentEditingSchedule.schedule_json.forEach((dayBlocks, dayIndex) => {
                dayBlocks.sort((a,b) => a.start - b.start);
                let col = document.createElement('div'); col.className = 'day-column';
                let html = `<div class="day-header"><span>📅 ${daysOfWeek[dayIndex]}</span></div><div class="block-list" data-day="${dayIndex}" ondragover="allowDrop(event)" ondrop="drop(event)">`;
                
                dayBlocks.forEach((block, blockIndex) => {
                    let css = block.type === 'study' ? (block.isGen ? 'general' : '') : block.type;
                    html += `<div class="task-card ${css}" draggable="true" ondragstart="drag(event, ${dayIndex}, ${blockIndex})"><div class="task-actions"><button class="btn-icon" onclick="openModal(${dayIndex}, ${blockIndex})">✏️</button><button class="btn-icon btn-delete" onclick="deleteBlock(${dayIndex}, ${blockIndex})">🗑️</button></div><div style="margin-right:45px;"><div class="task-title">${block.title}</div><div class="task-time">${minsToTime(block.start)} تا ${minsToTime(block.end)}</div></div></div>`;
                });
                
                html += `</div><div style="padding:10px;"><button class="btn-add" onclick="openModal(${dayIndex}, null)">➕ پارت دستی</button></div>`;
                col.innerHTML = html; 
                board.appendChild(col);
            });
        }

        let dDay = null; let dIdx = null;
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev, d, i) { dDay = d; dIdx = i; }
        
        function drop(ev) {
            ev.preventDefault(); 
            let target = ev.target.closest('.block-list'); 
            if(!target) return;
            let toDay = parseInt(target.getAttribute('data-day'));
            let moved = currentEditingSchedule.schedule_json[dDay].splice(dIdx, 1)[0];
            currentEditingSchedule.schedule_json[toDay].push(moved); 
            renderBoard(); showStatus();
        }

        function deleteBlock(d, i) { 
            if(confirm("آیا از حذف این پارت مطمئن هستید؟")) { 
                currentEditingSchedule.schedule_json[d].splice(i, 1); 
                renderBoard(); showStatus(); 
            } 
        }
        
        function openModal(d, i) { 
            editingDayIndex = d; 
            editingBlockIndex = i; 
            let b = i !== null ? currentEditingSchedule.schedule_json[d][i] : {title:'', type:'study', start:'', end:''}; 
            document.getElementById('modalTitle').innerText = i !== null ? "ویرایش پارت" : "پارت جدید"; 
            document.getElementById('m_title').value = b.title; 
            document.getElementById('m_type').value = b.type; 
            document.getElementById('m_start').value = b.start; 
            document.getElementById('m_end').value = b.end; 
            document.getElementById('editModal').style.display = 'flex'; 
        }
        
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        
        function saveBlockDetails() { 
            let n = { 
                title: document.getElementById('m_title').value, 
                type: document.getElementById('m_type').value, 
                start: parseInt(document.getElementById('m_start').value), 
                end: parseInt(document.getElementById('m_end').value), 
                isGen: false 
            }; 
            if(editingBlockIndex !== null) {
                currentEditingSchedule.schedule_json[editingDayIndex][editingBlockIndex] = n; 
            } else {
                currentEditingSchedule.schedule_json[editingDayIndex].push(n); 
            }
            closeModal(); renderBoard(); showStatus(); 
        }
        
        function showStatus() { 
            let el = document.getElementById('saveStatus'); 
            el.style.display = 'inline'; 
            setTimeout(() => el.style.display = 'none', 2000); 
        }

        async function publishSchedule() {
            if(!confirm("آیا از ساختار برنامه مطمئن هستید؟ این برنامه فوراً روی گوشی دانش‌آموز قفل باز می‌کند.")) return;
            document.getElementById('btnPublish').disabled = true; 
            document.getElementById('btnPublish').innerText = "در حال انتشار در اپلیکیشن دانش‌آموز...";
            
            await dbRequest(`weekly_schedules?id=eq.${currentEditingSchedule.id}`, 'PATCH', { 
                schedule_json: currentEditingSchedule.schedule_json, 
                status: 'تایید شده' 
            });
            
            alert("✅ برنامه با موفقیت منتشر شد!"); 
            document.getElementById('calendarBoard').style.display = 'none'; 
            document.getElementById('btnPublish').innerText = "🚀 تایید نهایی و انتشار برنامه برای دانش‌آموز";
            document.getElementById('btnPublish').disabled = true;
            loadPending();
        }
        
        loadPending();
    </script>
</body>
</html>
